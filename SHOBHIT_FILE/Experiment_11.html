<!DOCTYPE html>
<html>
<body>
<h2>Sum of N Numbers</h2>
<input type="number" id="num" placeholder="Enter Number">
<br><br>
<button onclick="findSum()">Calculate</button>
<p id="result"></p>
<script>
function findSum() {
  let n = Number(document.getElementById("num").value);
  let sum = 0;
  for (let i = 1; i <= n; i++) {
    sum += i;
  }
  document.getElementById("result").innerHTML = "Sum: " + sum;
}
</script>
</body>
</html>
